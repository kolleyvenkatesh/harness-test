pipeline:
  name: private-docker-images
  identifier: private_docker_images
  projectIdentifier: default_project
  orgIdentifier: default

  stages:
    - stage:
        name: List Private Images
        identifier: list_private
        type: Custom

        spec:
          execution:
            steps:
              - step:
                  type: ShellScript
                  name: Fetch Private Images
                  identifier: fetch_private_images
                  spec:
                    shell: Bash
                    executionTarget:
                      type: Delegate

                    environmentVariables:
                      - name: USERNAME
                        type: String
                        value: kolleyvenkatesh

                      - name: PASSWORD
                        type: Secret
                        value: docker-password   # 🔐 store in Harness Secrets

                    source:
                      type: Inline
                      spec:
                        script: |
                          echo "Fetching private Docker images..."

                          TOKEN=$(curl -s -X POST https://hub.docker.com/v2/users/login/ \
                            -H "Content-Type: application/json" \
                            -d "{\"username\": \"$USERNAME\", \"password\": \"$PASSWORD\"}" \
                            | grep -o '"token":"[^"]*' | cut -d '"' -f4)

                          curl -s -H "Authorization: JWT $TOKEN" \
                          "https://hub.docker.com/v2/repositories/$USERNAME/?page_size=100" \
                          | grep -o '"name":"[^"]*' \
                          | cut -d '"' -f4

        failureStrategies:
          - onFailure:
              errors:
                - AllErrors
              action:
                type: MarkAsFailure
